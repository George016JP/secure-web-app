name: Secure CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Step 4: Run the application
      - name: Run Python application
        run: |
          python app.py

      # Step 5: Security Scan (SAST) using Semgrep
      - name: Run Semgrep SAST Scan
        run: |
          pip install semgrep
          semgrep scan --config=auto

      # Step 6: Secret Scanning using Gitleaks
      - name: Run Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 7: Dependency Vulnerability Scanning using Trivy
      - name: Run Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs' # Scan the filesystem
          scan-ref: '.'
          format: 'table'
          exit-code: '1' # Fail the pipeline if severe vulnerabilities are found
          severity: 'CRITICAL,HIGH'
